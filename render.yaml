services:
  - type: web
    name: openschedulr-backend
    env: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/actuator/health
    autoDeploy: true
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: postgres
      - key: PGHOST
        sync: false
      - key: PGDATABASE
        sync: false
      - key: PGUSER
        sync: false
      - key: PGPASSWORD
        sync: false
      - key: PGSSLMODE
        value: require
      - key: PGCHANNELBINDING
        value: require
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: APP_SEED_DEMO_ENABLED
        value: "true"
      - key: APP_HOSTED_SCHEDULE_ENABLED
        value: "true"
      - key: APP_REALTIME_ENABLED
        value: "false"
      - key: BOOTSTRAP_ADMIN_ENABLED
        value: "true"
      - key: BOOTSTRAP_ADMIN_EMAIL
        value: admin@openschedulr.dev
      - key: BOOTSTRAP_ADMIN_PASSWORD
        value: Admin@123
